name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Cog
        run: |
          curl -o /usr/local/bin/cog -L https://github.com/replicate/cog/releases/latest/download/cog_linux_amd64
          chmod +x /usr/local/bin/cog

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: cog build -t ${{ secrets.DOCKERHUB_USERNAME }}/whisper-diarization:latest && docker push ${{ secrets.DOCKERHUB_USERNAME }}/whisper-diarization:latest
